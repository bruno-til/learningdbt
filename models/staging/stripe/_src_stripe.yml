sources:
  - name: stripe
    description: contains data about payment.
    database: raw
    tables:
      - name: payment
        config:
          loaded_at_field: _batched_at
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 72, period: hour}
        columns:
          - name: paymentmethod
            description: '{{doc("stripe_payment")}}'
          