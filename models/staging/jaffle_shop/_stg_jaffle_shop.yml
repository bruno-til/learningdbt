models:
  - name: stg_jaffle_shop__customers
    description: Table containing info about customers. Each row is one Customer Id.
    columns:
      - name: customer_id
        description: Primary key.
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: the first name of the client.
      - name: last_name
        description: the last name of the client.
  - name: stg_jaffle_shop__orders
    description: Table containing info about orders.
    columns:
      - name: order_id
        description: primary key.
        data_tests:
          - unique
          - not_null
      - name: status
        description: '{{ doc("order_status") }}'
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
      - name: customer_id
        description: Foreign key to stg_customers.customer_id.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: order_date
        description: The date the order was placed.

